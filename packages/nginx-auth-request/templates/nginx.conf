server {
  listen 80;
  server_name api.example.com;

  location / {
    auth_request /_valuya_auth;
    auth_request_set $valuya_payment_url $upstream_http_x_valuya_payment_url;
    auth_request_set $valuya_session_id $upstream_http_x_valuya_session_id;

    error_page 401 = @auth_error;
    error_page 402 = @payment_required;

    proxy_pass http://app_backend;
  }

  location = /_valuya_auth {
    internal;
    proxy_pass http://valuya_authz/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Valuya-Subject-Id $http_x_valuya_subject_id;
  }

  location @payment_required {
    default_type application/json;
    return 402 '{"error":"payment_required","payment_url":"'$valuya_payment_url'","session_id":"'$valuya_session_id'"}';
  }
}
