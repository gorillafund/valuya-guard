apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: premium-api
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://valuya-authz.default.svc.cluster.local:8080/auth"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Valuya-Payment-Url,X-Valuya-Session-Id"
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
