server {
  listen 8081;

  location / {
    auth_request /_valuya_auth;
    error_page 402 = @payment_required;
    proxy_pass http://upstream_app:8080;
  }

  location = /_valuya_auth {
    internal;
    proxy_pass http://valuya_guard_gateway:8090/guard/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";

    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Original-Path $uri;
    proxy_set_header X-Valuya-Subject-Id $http_x_valuya_subject_id;
    proxy_set_header Accept $http_accept;
  }

  location @payment_required {
    default_type application/json;
    return 402 '{"error":"payment_required","payment_url":"'$upstream_http_x_valuya_payment_url'","session_id":"'$upstream_http_x_valuya_session_id'"}';
  }
}
